<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">  

  <link href="css/stylesheet.css" rel="stylesheet">
  
  <title>Frontend Mentor | Social links profile</title>

  <style>
    .attribution { font-size: 13px; color: hsl(75, 94%, 57%); text-align: center; }
    .attribution a { color: hsl(228, 83%, 82%); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="assets/images/avatar-jessica.jpeg" alt="profile picture woman">
      <h1>Jessica Randall</h1>
      <p class="green-text">London, United Kingdom</p>
      <p>"Front-end developer and avid reader."</p>
    </header>
    <main>
      <div class="link-box">GitHub</div>
      <div class="link-box">Frontend Mentor</div>
      <div class="link-box">LinkedIn</div>
      <div class="link-box">Twitter</div>
      <div class="link-box">Instagram</div>
    </main>
  </div>

  <footer>
    <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/whiterabbit012">Emma Valerie Moon</a>.
    </div>
  </footer>
</body>
</html>
